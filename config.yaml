# Atom Mesh VPN Configuration File

# Node Identity and Role
node:
  # The unique name of this node within the mesh (must be unique).
  name: "node-1"

  # Set to true ONLY for the very first node to initialize a new mesh cluster.
  # All subsequent nodes joining the mesh must have this set to false.
  bootstrap: true

  # (Bootstrapper only) The internal VPN IP range to use for the mesh.
  # The bootstrapper broadcasts this to the mesh state so future leaders
  # know how to assign IPs to new nodes. Followers can leave this blank.
  network:
    ip: "10.7.0.0"
    cidr: 16

# Networking
network_config:
  # The UDP port WireGuard will listen on for the encrypted VPN tunnel.
  wireguard_port: 51820

  # The TCP port used to securely accept incoming join requests from new nodes.
  tcp_join_port: 7700

# Joining an Existing Mesh (Followers Only)
join_config:
  # The public IP and TCP port of ANY existing node in the mesh to join.
  # Leave empty if this node is the bootstrapper.
  endpoint: "82.123.45.67:8080"

# Distributed Consensus (Raft)
consensus:
  # The directory where Raft will persist its log, state, and snapshots.
  data_dir: "/tmp/raft-data"

  # The TCP port used by HashiCorp Raft for cluster consensus communication.
  raft_port: 7000

# Security and Cryptography
security_config:
  # The absolute path where the WireGuard private key will be stored.
  # If it doesn't exist, Atom will generate a new one automatically.
  private_key_path: "./wg_private.key"

  # (Followers only) The one-time join token generated by 'atom token create'.
  # Leave empty if this node is the bootstrapper.
  join_token: ""

# Local API
api_config:
  # The Unix socket path for the local CLI to communicate with the daemon.
  socket_path: "/var/run/atom.sock"
